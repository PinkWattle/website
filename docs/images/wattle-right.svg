<?xml version="1.0" encoding="UTF-8"?>
<!-- Right-margin wattle branch: stem on outer (right) edge, phyllodes pointing inward (left) toward the content column -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 600">
  <g fill="#1E3D30" opacity="0.08">
    <!-- Gently curving main stem (mirrored) -->
    <path d="M208 0 C212 100 202 220 210 350 C216 440 207 530 211 600"
          stroke="#1E3D30" stroke-width="1.5" fill="none"/>

    <!-- Cluster 1 — y ≈ 48–108 (leaves pointing left/inward) -->
    <ellipse cx="164" cy="48"  rx="44" ry="5.5" transform="rotate(28  207 48)"/>
    <ellipse cx="164" cy="67"  rx="42" ry="5"   transform="rotate(16  207 67)"/>
    <ellipse cx="164" cy="86"  rx="40" ry="5"   transform="rotate(5   207 86)"/>
    <ellipse cx="164" cy="105" rx="38" ry="4.5" transform="rotate(-7  207 105)"/>

    <!-- Cluster 2 — y ≈ 170–235 -->
    <ellipse cx="164" cy="170" rx="44" ry="5.5" transform="rotate(24  207 170)"/>
    <ellipse cx="164" cy="189" rx="42" ry="5"   transform="rotate(13  207 189)"/>
    <ellipse cx="164" cy="208" rx="40" ry="5"   transform="rotate(2   207 208)"/>
    <ellipse cx="164" cy="227" rx="38" ry="4.5" transform="rotate(-9  207 227)"/>

    <!-- Cluster 3 — y ≈ 295–360 -->
    <ellipse cx="164" cy="293" rx="44" ry="5.5" transform="rotate(26  207 293)"/>
    <ellipse cx="164" cy="312" rx="42" ry="5"   transform="rotate(14  207 312)"/>
    <ellipse cx="164" cy="331" rx="40" ry="5"   transform="rotate(3   207 331)"/>
    <ellipse cx="164" cy="350" rx="38" ry="4.5" transform="rotate(-8  207 350)"/>

    <!-- Cluster 4 — y ≈ 415–480 -->
    <ellipse cx="164" cy="413" rx="44" ry="5.5" transform="rotate(25  207 413)"/>
    <ellipse cx="164" cy="432" rx="42" ry="5"   transform="rotate(13  207 432)"/>
    <ellipse cx="164" cy="451" rx="40" ry="5"   transform="rotate(2   207 451)"/>
    <ellipse cx="164" cy="470" rx="38" ry="4.5" transform="rotate(-8  207 470)"/>

    <!-- Cluster 5 — y ≈ 530–590 (for seamless vertical tiling) -->
    <ellipse cx="164" cy="530" rx="44" ry="5.5" transform="rotate(26  207 530)"/>
    <ellipse cx="164" cy="549" rx="42" ry="5"   transform="rotate(14  207 549)"/>
    <ellipse cx="164" cy="568" rx="40" ry="5"   transform="rotate(3   207 568)"/>
    <ellipse cx="164" cy="587" rx="38" ry="4.5" transform="rotate(-7  207 587)"/>
  </g>
</svg>
